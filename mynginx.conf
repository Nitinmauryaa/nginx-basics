events {
    worker_connections 1024;
}

http {
    include mime.types;
    upstream backendserver{
        server 127.0.0.1:1111;
        server 127.0.0.1:2222;
        server 127.0.0.1:3333;
        server 127.0.0.1:7777;

    }
    types {
        text/html html;
        text/css css;
    }
    rewrite ^/number/(\w+) /count/$1;
    location ~* /count/[0-9] {
        root /nginx1;
        try_files /index.html = 404;
    }
    server {
        listen 8080;
        server_name localhost;
        location /{
            proxy_pass https://backendserver/;
        }

        root /nginx1;
        index index.html;
        
        location /fruits {
            root /nginx1;
        }
        location /curls{
            alias /nginx1/fruits;
        }
        location /vegetables {
            root /nginx1;
            try_files /vegetables/veggies.html = 404;
        }
        location /crops{
            return 307 /fruits;
        }
        # https://localhost:8080/fruits/
    }
}
